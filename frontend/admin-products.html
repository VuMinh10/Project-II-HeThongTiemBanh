<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .sidebar { min-height: 100vh; background-color: #343a40; }
        .sidebar a { color: #cfd8dc; text-decoration: none; padding: 15px; display: block; }
        .sidebar a:hover, .sidebar a.active { background-color: #495057; color: #fff; }
    </style>
</head>
<body class="bg-light" style="display: none;"> 

    <div class="d-flex">
        
        <div id="admin-sidebar-placeholder"></div>

        <div class="flex-grow-1 p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Quản lý Sản phẩm</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal">
                    <i class="fas fa-plus"></i> Thêm Bánh Mới
                </button>
            </div>

            <div id="mainAlert" class="alert d-none" role="alert"></div>

            <div class="card shadow border-0">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>Tên Bánh</th>
                                <th>Danh Mục</th>
                                <th>Giá Bán</th>
                                <th>Trạng Thái</th>
                                <th>Tồn Kho</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            <tr><td colspan="7" class="text-center py-4">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </div>

    <div class="modal fade" id="addProductModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Thêm Sản Phẩm Mới</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addProductForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tên bánh</label>
                                <input type="text" class="form-control" id="productName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Danh mục</label>
                                <select class="form-select" id="categoryId" required>
                                    <option value="">Đang tải danh mục...</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Giá bán (VNĐ)</label>
                                <input type="number" class="form-control" id="price" min="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tồn kho</label>
                                <input type="number" class="form-control" id="quantityAvailable" min="0" required>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Link Hình ảnh (URL)</label>
                                <input type="url" class="form-control" id="imageUrl" placeholder="https://...">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Trạng thái</label>
                                <select class="form-select" id="status">
                                    <option value="Còn bán">Còn bán</option>
                                    <option value="Hết hàng">Hết hàng</option>
                                    <option value="Ngừng bán">Ngừng bán</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3 d-flex align-items-end">
                                <div class="form-check fs-5 mb-1">
                                    <input class="form-check-input" type="checkbox" id="isPreOrder">
                                    <label class="form-check-label">Hàng phải đặt trước</label>
                                </div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Mô tả bánh</label>
                                <textarea class="form-control" id="description" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="text-end mt-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" id="btnSave" class="btn btn-success"><i class="fas fa-save"></i> Lưu Sản Phẩm</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="admin-common.js"></script>
    
    <script>
        // Lấy token từ bộ nhớ
        const token = localStorage.getItem('bakery_token');

        // Các biến quản lý trạng thái
        let currentProducts = []; 
        let editingId = null; 

        // Hàm hiển thị thông báo
        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('mainAlert');
            alertBox.className = `alert alert-${type}`;
            alertBox.innerText = message;
            alertBox.classList.remove('d-none');
            setTimeout(() => alertBox.classList.add('d-none'), 3000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!token) {
                window.location.replace('/login.html');
                return;
            }
            document.body.style.display = 'block';

            await loadCategories();
            await loadProducts();
        });

        // Hàm tải Category vào Dropdown
        async function loadCategories() {
            try {
                const response = await fetch('http://localhost:3000/api/categories');
                const categories = await response.json();
                const select = document.getElementById('categoryId');
                
                select.innerHTML = '<option value="">-- Chọn danh mục --</option>';
                categories.forEach(c => {
                    select.innerHTML += `<option value="${c.CategoryID}">${c.CategoryName}</option>`;
                });
            } catch (error) {
                console.error('Lỗi tải danh mục:', error);
            }
        }

        // Tải danh sách product (kèm token)
        async function loadProducts() {
            try {
                const response = await fetch('http://localhost:3000/api/products');
                currentProducts = await response.json(); // Lưu bộ nhớ đệm
                
                const tbody = document.getElementById('productTableBody');
                tbody.innerHTML = '';
                
                if (currentProducts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">Chưa có sản phẩm nào.</td></tr>';
                    return;
                }

                currentProducts.forEach(p => {
                    const cateName = p.CategoryName || `ID: ${p.CategoryID}`;
                    const badgeClass = p.Status === 'Còn bán' ? 'bg-success' : (p.Status === 'Hết hàng' ? 'bg-warning text-dark' : 'bg-danger');

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>#${p.ProductID}</strong></td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <img src="${p.ImageURL || 'https://via.placeholder.com/50'}" class="rounded me-2" width="50" height="50" style="object-fit: cover;">
                                    ${p.ProductName}
                                </div>
                            </td>
                            <td><span class="badge bg-secondary">${cateName}</span></td>
                            <td class="text-danger fw-bold">${Number(p.Price).toLocaleString('vi-VN')}₫</td>
                            <td>${p.quantityAvailable} ${p.IsPreOrder ? '<span class="badge bg-info text-dark">Đặt trước</span>' : ''}</td>
                            <td><span class="badge ${badgeClass}">${p.Status}</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" onclick="openEditForm(${p.ProductID})"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${p.ProductID})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                showAlert('Không thể tải danh sách sản phẩm', 'danger');
            }
        }

        // Mở form sửa
        window.openEditForm = function(id) {
            editingId = id; 
            const p = currentProducts.find(item => item.ProductID === id); 

            // Đổ dữ liệu vào
            document.getElementById('productName').value = p.ProductName;
            document.getElementById('description').value = p.Description || '';
            document.getElementById('imageUrl').value = p.ImageURL || '';
            document.getElementById('price').value = p.Price;
            document.getElementById('categoryId').value = p.CategoryID;
            document.getElementById('status').value = p.Status;
            document.getElementById('quantityAvailable').value = p.quantityAvailable;
            document.getElementById('isPreOrder').checked = p.IsPreOrder === 1;

            // Đổi tiêu đề Modal
            document.querySelector('.modal-title').innerText = 'Sửa Bánh #' + id;
            new bootstrap.Modal(document.getElementById('addProductModal')).show();
        };

        // Reset khi bấm 'thêm mới'
        document.querySelector('[data-bs-target="#addProductModal"]').addEventListener('click', () => {
            editingId = null; 
            document.getElementById('addProductForm').reset();
            document.querySelector('.modal-title').innerText = 'Thêm Sản Phẩm Mới';
        });

        // Xử lý lưu
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSave = document.getElementById('btnSave');
            btnSave.disabled = true;
            btnSave.innerText = 'Đang xử lý...';

            const payload = {
                productName: document.getElementById('productName').value,
                description: document.getElementById('description').value,
                imageUrl: document.getElementById('imageUrl').value,
                price: document.getElementById('price').value,
                categoryId: document.getElementById('categoryId').value,
                status: document.getElementById('status').value,
                quantityAvailable: document.getElementById('quantityAvailable').value,
                isPreOrder: document.getElementById('isPreOrder').checked ? 1 : 0,
            };

            try {
                const url = editingId 
                    ? `http://localhost:3000/api/products/${editingId}` 
                    : 'http://localhost:3000/api/products';
                    
                const method = editingId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // Mang theo thẻ bài
                    },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Lỗi hệ thống');

                showAlert(editingId ? 'Đã cập nhật bánh thành công.' : 'Đã thêm bánh mới.');
                bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();
                loadProducts();

            } catch (error) {
                showAlert(error.message, 'danger');
            } finally {
                btnSave.disabled = false;
                btnSave.innerHTML = '<i class="fas fa-save"></i> Lưu Sản Phẩm';
            }
        });

        // Xóa sản phẩm (token)
        window.deleteProduct = async function(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa sản phẩm này không?')) return;

            try {
                const response = await fetch(`http://localhost:3000/api/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error);

                showAlert('Đã xóa sản phẩm thành công!');
                loadProducts(); 
            } catch (error) {
                showAlert(error.message, 'danger');
            }
        };
    </script>
</body>
</html>
