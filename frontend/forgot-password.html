<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - SweetBakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow border-0" style="width: 400px;">
        <div class="card-body p-4 text-center">
            <h3 class="text-center text-primary mb-4">Quên mật khẩu?</h3>
            <p class="text-muted small mb-4">Vui lòng nhập email bạn đã đăng ký. Chúng tôi sẽ gửi link khôi phục cho bạn.</p>

            <form id="forgotForm">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Địa chỉ Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="txtEmail" class="form-control" placeholder="Nhập email của bạn" required>
                    </div>
                </div>
                
                <button type="submit" id="btnSubmit" class="btn btn-primary w-100 fw-bold mb-3">Gửi link khôi phục</button>
                <a href="login.html" class="text-decoration-none small text-secondary"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const email = document.getElementById('txtEmail').value;

            btn.disabled = true;
            btn.innerText = 'Đang gửi...';

            try {
                const response = await fetch('http://localhost:3000/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('Thành công! Vui lòng kiểm tra hộp thư email của bạn (bao gồm cả thư mục Spam).');
                    window.location.replace('login.html');
                } else {
                    alert('Lỗi: ' + result.error);
                }
            } catch (error) {
                alert('Lỗi kết nối đến máy chủ!');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Gửi link khôi phục';
            }
        });
    </script>
</body>
</html>
