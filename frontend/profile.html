<!DOCTYPE html> //XXX
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi - Tiệm Bánh Ngọt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4" style="border-radius: 15px;">
                    <h3 class="text-center text-primary mb-4">👤 Thông tin cá nhân</h3>
                    
                    <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

                    <div id="loadingSpinner" class="text-center mb-3">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Đang tải...</span>
                        </div>
                        <p class="text-muted mt-2">Đang tải dữ liệu...</p>
                    </div>

                    <div id="profileForm" class="d-none">
                        <div class="mb-3">
                            <label class="form-label text-muted">Tên tài khoản</label>
                            <input type="text" class="form-control" id="username" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Họ và tên</label>
                            <input type="text" class="form-control" id="fullName" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Số điện thoại</label>
                            <input type="text" class="form-control" id="phone" readonly>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Email</label>
                            <input type="email" class="form-control" id="email" readonly>
                        </div>

                        <button id="btnLogout" class="btn btn-outline-danger w-100">Đăng Xuất</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');

            // 1. Kiểm tra Token: Nếu không có, âm thầm đuổi về trang login ngay lập tức
            if (!token) {
                window.location.replace('/login.html'); 
                return;
            }

            const errorAlert = document.getElementById('errorAlert');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const profileForm = document.getElementById('profileForm');

            try {
                // 2. Fetch dữ liệu từ API
                const response = await fetch('http://localhost:3000/api/profile', {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${token}` 
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Phiên đăng nhập không hợp lệ');
                }

                // 3. Đổ dữ liệu vào giao diện
                document.getElementById('username').value = data.profile.Username;
                document.getElementById('fullName').value = data.profile.FullName;
                document.getElementById('phone').value = data.profile.Phone || 'Chưa cập nhật';
                document.getElementById('email').value = data.profile.Email || 'Chưa cập nhật';

                // Tắt vòng quay loading và hiện Form lên
                loadingSpinner.classList.add('d-none');
                profileForm.classList.remove('d-none');

            } catch (error) {
                // Xử lý khi token lỗi hoặc mạng rớt
                loadingSpinner.classList.add('d-none');
                errorAlert.innerText = error.message;
                errorAlert.classList.remove('d-none');
                
                // Xóa token hỏng và đẩy về login sau 2 giây
                localStorage.removeItem('token');
                setTimeout(() => window.location.replace('/login.html'), 2000);
            }
        });

        // Xử lý Đăng xuất
        document.getElementById('btnLogout').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('userInfo'); 
            window.location.replace('/login.html');
        });
    </script>
</body>
</html>
