<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - SweetBakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 450px; border-radius: 15px;">
        <h3 class="text-center text-primary mb-4">Tạo tài khoản mới</h3>
        
        <div id="statusAlert" class="alert d-none" role="alert"></div>

        <form id="registerForm">
            <div class="mb-3">
                <input type="text" class="form-control" id="username" required placeholder="Tên tài khoản (viết liền không dấu)">
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" required placeholder="Mật khẩu">
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" id="fullName" required placeholder="Họ và tên của bạn">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="tel" class="form-control" id="phone" required placeholder="Số điện thoại">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="email" class="form-control" id="email" required placeholder="Email">
                </div>
            </div>
            <button type="submit" id="btnRegister" class="btn btn-primary fw-bold w-100">Đăng Ký Ngay</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login.html" class="text-decoration-none">Đã có tài khoản? Đăng nhập</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnRegister = document.getElementById('btnRegister');
            const statusAlert = document.getElementById('statusAlert');

            // Reset UI khi bắt đầu gửi request
            btnRegister.disabled = true;
            btnRegister.innerText = 'Đang xử lý...';
            statusAlert.classList.add('d-none');

            // Gom dữ liệu chuẩn chữ thường (camelCase) khớp với Backend
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            };

            try {
                const response = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'Đăng ký thất bại');
                }

                // Xử lý khi thành công: Hiện màu xanh và tự động chuyển trang sau 1.5 giây
                statusAlert.className = 'alert alert-success';
                statusAlert.innerText = 'Đăng ký thành công! Đang chuyển hướng...';
                statusAlert.classList.remove('d-none');

                setTimeout(() => {
                    window.location.replace('/login.html');
                }, 1500);

            } catch (error) {
                // Xử lý khi lỗi: Hiện màu đỏ
                statusAlert.className = 'alert alert-danger';
                statusAlert.innerText = error.message;
                statusAlert.classList.remove('d-none');
                
                // Mở lại nút bấm để thử lại
                btnRegister.disabled = false;
                btnRegister.innerText = 'Đăng Ký Ngay';
            }
        });
    </script>
</body>
</html>
