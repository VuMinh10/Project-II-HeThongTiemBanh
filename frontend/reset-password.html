<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu -  SweetBakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow border-0" style="width: 400px;">
        <div class="card-body p-4 text-center">
            <h3 class="text-center text-primary mb-4">Tạo mật khẩu mới</h3>
            
            <form id="resetForm">
                <div class="mb-3 text-start">
                    <label for="txtNewPassword" class="form-label fw-bold">Mật khẩu mới</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="txtNewPassword" class="form-control" placeholder="Ít nhất 6 ký tự" required minlength="6">
                    </div>
                </div>
                
                <div class="mb-4 text-start">
                    <label for="txtConfirmPassword" class="form-label fw-bold">Xác nhận mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                        <input type="password" id="txtConfirmPassword" class="form-control" placeholder="Nhập lại mật khẩu" required minlength="6">
                    </div>
                    <small id="passwordError" class="text-danger d-none mt-1">Mật khẩu không khớp!</small>
                </div>
                
                <button type="submit" id="btnSubmit" class="btn btn-primary w-100 fw-bold">Lưu mật khẩu & Đăng nhập</button>
            </form>

            <script>
                document.getElementById('resetForm').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const token = urlParams.get('token');
                    const userId = urlParams.get('id'); 
                    
                    const newPassword = document.getElementById('txtNewPassword').value;
                    const confirmPassword = document.getElementById('txtConfirmPassword').value;
                    const errorMsg = document.getElementById('passwordError');

                    // Validate mật khẩu khớp nhau
                    if (newPassword !== confirmPassword) {
                        errorMsg.classList.remove('d-none');
                        return;
                    } else {
                        errorMsg.classList.add('d-none');
                    }

                    if (!token || !userId) {
                        alert('Đường link không hợp lệ hoặc đã bị hỏng!');
                        return;
                    }

                    const btn = document.getElementById('btnSubmit');
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...'; // Thêm icon xoay

                    try {
                        // Dùng đường dẫn tương đối
                        const response = await fetch('/api/reset-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token, userId, newPassword })
                        });
                        
                        const result = await response.json();
                        
                        if (response.ok) {
                            alert('Đổi mật khẩu thành công!');
                            window.location.replace('login.html');
                        } else {
                            alert('Lỗi: ' + result.error);
                        }
                    } catch (error) {
                        alert('Lỗi kết nối đến máy chủ!');
                    } finally {
                        btn.disabled = false;
                        btn.innerText = 'Lưu mật khẩu & Đăng nhập';
                    }
                });
            </script>
